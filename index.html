<html lang="en">

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
.pf-root {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  min-height: 100vh;
  background: radial-gradient(120% 60% at 50% -10%, #E7ECF0 0%, rgba(231,236,240,0) 60%), #EDF0F3;
  color: #1C2A33; display: flex; justify-content: center;
  padding: max(12px, env(safe-area-inset-top)) 16px calc(44px + env(safe-area-inset-bottom));
  -webkit-font-smoothing: antialiased;
}
.pf-app { width: 100%; max-width: 460px; }
.pf-splash { height: 70vh; display: flex; align-items: center; justify-content: center; }
.pf-spinner { width: 30px; height: 30px; border-radius: 50%; border: 3px solid #D5DCE2; border-top-color: #3F9D8A; animation: pf-spin .8s linear infinite; }
@keyframes pf-spin { to { transform: rotate(360deg); } }

.pf-header { display: flex; align-items: flex-end; justify-content: space-between; margin: 2px 4px 12px; }
.pf-eyebrow { font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #8B97A2; }
.pf-h1 { margin: 3px 0 0; font-size: 22px; font-weight: 750; letter-spacing: -.01em; color: #16323D; }
.pf-gear { width: 42px; height: 42px; border: none; border-radius: 13px; background: #fff; color: #5A6873;
  display: grid; place-items: center; cursor: pointer; box-shadow: 0 1px 2px rgba(16,42,53,.05), 0 8px 18px -12px rgba(16,42,53,.18); transition: transform .15s ease; }
.pf-gear:active { transform: scale(.93); }

.pf-syncbar { display: flex; margin: 0 2px 14px; }
.pf-syncchip { display: inline-flex; align-items: center; gap: 7px; padding: 8px 12px; border-radius: 999px; background: #fff; border: 1px solid #E6EBEF;
  color: #5A6873; font-size: 12px; font-weight: 650; cursor: pointer; width: 100%; justify-content: center;
  box-shadow: 0 1px 2px rgba(16,42,53,.04); transition: transform .12s ease, background .15s ease; font-family: inherit; }
.pf-syncchip:active { transform: scale(.99); }
.pf-syncchip--ok { color: #2F8E7B; }
.pf-syncchip--warn { color: #C0894A; }
.pf-syncchip--go { color: #2F8E7B; border-color: #CDE7E0; background: #F4FAF8; }
.pf-syncchip--muted { color: #8B97A2; }
.pf-synctime { color: #9AA5AE; font-weight: 600; }
.pf-spin { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #CFE6E0; border-top-color: #2F8E7B; animation: pf-spin .8s linear infinite; flex: 0 0 auto; }

.pf-hero {
  background: linear-gradient(158deg, #1f4150 0%, #173641 55%, #122a34 100%);
  border-radius: 26px; padding: 24px 20px 18px; color: #fff; text-align: center;
  box-shadow: 0 18px 42px -18px rgba(15,40,50,.6), inset 0 1px 0 rgba(255,255,255,.05);
  position: relative; overflow: hidden; animation: pf-fadeup .6s cubic-bezier(.22,1,.36,1) both;
}
.pf-hero::before { content: ""; position: absolute; top: -40%; right: -20%; width: 240px; height: 240px;
  background: radial-gradient(circle, rgba(95,208,182,.16), transparent 70%); pointer-events: none; }

.pf-ringwrap { position: relative; margin: 2px auto 4px; }
.pf-ringfill { transition: stroke-dashoffset 1.15s cubic-bezier(.22,1,.36,1), stroke .45s ease; }
.pf-ringcenter { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
.pf-ringlab { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: rgba(255,255,255,.6); }
.pf-ringnum { font-size: 38px; font-weight: 800; letter-spacing: -.025em; font-variant-numeric: tabular-nums; line-height: 1.05; }
.pf-ringsub { font-size: 12px; color: rgba(255,255,255,.62); font-variant-numeric: tabular-nums; }

.pf-cycle { margin: 12px 4px 4px; }
.pf-cycleline { position: relative; height: 5px; border-radius: 999px; background: rgba(255,255,255,.16); }
.pf-cyclefill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 999px; background: rgba(255,255,255,.55); transition: width 1.1s cubic-bezier(.22,1,.36,1); }
.pf-cycledot { position: absolute; top: 50%; width: 12px; height: 12px; border-radius: 50%; background: #fff; transform: translate(-50%,-50%);
  box-shadow: 0 0 0 4px rgba(255,255,255,.18); transition: left 1.1s cubic-bezier(.22,1,.36,1); }
.pf-cyclelabels { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; font-size: 11.5px; color: rgba(255,255,255,.6); font-variant-numeric: tabular-nums; }
.pf-cyclepay { font-weight: 650; color: #fff; }

.pf-pills { display: flex; align-items: stretch; margin-top: 16px; background: rgba(255,255,255,.08); border-radius: 15px; padding: 4px; }
.pf-pill { flex: 1; padding: 9px 6px 10px; display: flex; flex-direction: column; gap: 3px; }
.pf-pilllab { font-size: 10.5px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: rgba(255,255,255,.55); }
.pf-pillval { font-size: 18px; font-weight: 750; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
.pf-pilldiv { width: 1px; background: rgba(255,255,255,.12); margin: 8px 0; }

.pf-card { background: #fff; border-radius: 22px; padding: 16px 16px 14px; margin-top: 14px;
  box-shadow: 0 1px 2px rgba(16,42,53,.04), 0 14px 30px -16px rgba(16,42,53,.14); animation: pf-fadeup .6s cubic-bezier(.22,1,.36,1) both; }
.pf-cardhead { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px; }
.pf-cardtitle { margin: 0; font-size: 15px; font-weight: 750; color: #16323D; }
.pf-cardtot { font-size: 17px; font-weight: 750; font-variant-numeric: tabular-nums; letter-spacing: -.01em; color: #1C2A33; }
.pf-pos { color: #2F8E7B; }
.pf-neg { color: #C25840; }

.pf-subhead { display: flex; align-items: center; justify-content: space-between; margin: 6px 2px 2px; padding-top: 12px; border-top: 1px solid #EEF1F4; }
.pf-subtitle { font-size: 12px; font-weight: 650; letter-spacing: .04em; text-transform: uppercase; color: #8B97A2; }
.pf-subtot { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; }
.pf-count { display: inline-grid; place-items: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: #EDF1F4; color: #6B7884; font-size: 11px; font-weight: 700; margin-left: 4px; }

.pf-list { display: flex; flex-direction: column; }
.pf-exp { display: flex; align-items: center; gap: 12px; padding: 11px 6px; border-radius: 13px; cursor: pointer; transition: background .15s ease; }
.pf-exp:hover { background: #F6F8FA; }
.pf-exp:active { background: #EFF3F6; }
.pf-exp--paid { opacity: .55; }
.pf-exp--paid .pf-expname { text-decoration: line-through; text-decoration-color: #C2CBD2; }

.pf-ic { width: 42px; height: 42px; border-radius: 13px; display: grid; place-items: center; flex-shrink: 0; font-size: 20px; }

.pf-expmid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.pf-expname { font-size: 15px; font-weight: 600; color: #1C2A33; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pf-expcat { font-size: 12.5px; color: #8B97A2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pf-expamt { font-size: 15px; font-weight: 650; font-variant-numeric: tabular-nums; color: #1C2A33; }

.pf-check { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #D2DAE0; background: #fff; margin-left: 4px;
  display: grid; place-items: center; color: #fff; cursor: pointer; flex-shrink: 0; transition: transform .15s ease, background .2s ease, border-color .2s ease; }
.pf-check:active { transform: scale(.86); }
.pf-check--on { background: #3F9D8A; border-color: #3F9D8A; animation: pf-pop .3s ease; }

.pf-compbar { display: flex; gap: 2px; height: 11px; border-radius: 999px; overflow: hidden; background: #EEF1F4; margin-bottom: 10px; }
.pf-seg { height: 100%; transition: width .9s cubic-bezier(.22,1,.36,1); }
.pf-seg--empty { background: #E4E9EE; }
.pf-expmeta { display: flex; justify-content: space-between; font-size: 12.5px; color: #8B97A2; margin-bottom: 6px; padding: 0 2px; }
.pf-expmeta strong { color: #1C2A33; font-weight: 700; font-variant-numeric: tabular-nums; }

.pf-empty { font-size: 13px; color: #9AA5AE; text-align: center; padding: 14px 8px; line-height: 1.5; }

.pf-add { width: 100%; margin-top: 8px; padding: 12px; border: 1.5px dashed #D3DBE1; border-radius: 14px; background: transparent;
  color: #2F8E7B; font-size: 14px; font-weight: 650; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .15s ease, border-color .15s ease, transform .12s ease; font-family: inherit; }
.pf-add:hover { background: #F4FAF8; border-color: #9FCFC4; }
.pf-add:active { transform: scale(.99); }

.pf-foot { text-align: center; font-size: 11.5px; color: #9AA5AE; margin: 18px 12px 0; line-height: 1.6; }

.pf-goals { display: flex; flex-direction: column; gap: 2px; margin-bottom: 2px; }
.pf-goal { display: flex; align-items: center; gap: 8px; }

.pf-goalrow:active { background: #EFF3F6; }
.pf-goalemoji { width: 42px; height: 42px; border-radius: 13px; display: grid; place-items: center; font-size: 21px; flex-shrink: 0; }
.pf-goalmid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }
.pf-goaltop { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
.pf-goalname { font-size: 15px; font-weight: 600; color: #1C2A33; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pf-goalnums { font-size: 13.5px; color: #8B97A2; font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; }

.pf-goalof { font-weight: 600; }
.pf-goalbar { height: 8px; border-radius: 999px; background: #EEF1F4; overflow: hidden; }
.pf-goalfill { height: 100%; border-radius: 999px; transition: width 1s cubic-bezier(.22,1,.36,1); }
.pf-goalmeta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.pf-goalhint { font-size: 11.5px; color: #8B97A2; font-variant-numeric: tabular-nums; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pf-goalhint--ok { color: #2F8E7B; font-weight: 600; }
.pf-goalhint--warn { color: #C0894A; font-weight: 600; }
.pf-goalpct { font-size: 11.5px; font-weight: 700; color: #6B7884; font-variant-numeric: tabular-nums; flex-shrink: 0; }
.pf-goaladd { width: 36px; height: 36px; border-radius: 11px; border: 1.5px solid #DCEAE6; background: #F4FAF8; color: #2F8E7B;
  display: grid; place-items: center; cursor: pointer; flex-shrink: 0; transition: transform .12s ease, background .15s ease; }
.pf-goaladd:active { transform: scale(.9); }
.pf-goaladd:hover { background: #E9F5F1; }

.pf-emojigrid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
.pf-emoji { aspect-ratio: 1; border: 1.5px solid #EAEEF1; border-radius: 12px; background: #fff; font-size: 20px; cursor: pointer;
  display: grid; place-items: center; transition: transform .12s ease, border-color .15s ease, background .15s ease; }
.pf-emoji:active { transform: scale(.92); }
.pf-emoji--on { border-width: 2px; }
.pf-colorrow { display: flex; gap: 12px; flex-wrap: wrap; }
.pf-swatch { width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; transition: transform .12s ease; box-shadow: inset 0 0 0 2px #fff; }
.pf-swatch:active { transform: scale(.9); }
.pf-swatch--on { box-shadow: inset 0 0 0 2px #fff, 0 0 0 2px #16323D; }

.pf-quickrow { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.pf-quick { padding: 8px 12px; border-radius: 11px; border: 1.5px solid #E2E8ED; background: #FAFBFC; color: #5A6873;
  font-size: 13px; font-weight: 650; cursor: pointer; font-family: inherit; font-variant-numeric: tabular-nums; transition: transform .12s ease, border-color .15s ease; }
.pf-quick:active { transform: scale(.94); }
.pf-quick:hover { border-color: #9FCFC4; }
.pf-newtotal { font-size: 14px; color: #5A6873; background: #F4FAF8; border-radius: 12px; padding: 12px 14px; font-variant-numeric: tabular-nums; }
.pf-newtotal strong { color: #16323D; font-weight: 750; }

.pf-histlegend { display: flex; align-items: center; font-size: 11.5px; color: #8B97A2; font-weight: 600; }
.pf-dot { width: 9px; height: 9px; border-radius: 3px; display: inline-block; margin: 0 4px 0 9px; }
.pf-dot--in { background: #3F9D8A; }
.pf-dot--out { background: #C58F77; }
.pf-chart { display: flex; align-items: flex-end; justify-content: space-between; gap: 6px; height: 132px; padding: 4px 2px 0; margin-bottom: 12px; }
.pf-cgroup { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
.pf-cbars { display: flex; align-items: flex-end; gap: 3px; height: 108px; }
.pf-cbar { width: 11px; border-radius: 4px 4px 0 0; transition: height .9s cubic-bezier(.22,1,.36,1); min-height: 2px; }
.pf-cbar--in { background: #3F9D8A; }
.pf-cbar--out { background: #C58F77; }
.pf-cgroup--live .pf-cbar--in { background: repeating-linear-gradient(135deg, #3F9D8A 0 4px, #6FBCAB 4px 8px); }
.pf-cgroup--live .pf-cbar--out { background: repeating-linear-gradient(135deg, #C58F77 0 4px, #DAAE96 4px 8px); }
.pf-clabel { font-size: 10.5px; color: #8B97A2; font-weight: 600; white-space: nowrap; }
.pf-cgroup--live .pf-clabel { color: #2F8E7B; font-weight: 700; }

.pf-histstats { display: flex; align-items: stretch; background: #F7F9FB; border-radius: 14px; padding: 12px 8px; }
.pf-histstats > div { flex: 1; display: flex; flex-direction: column; gap: 3px; align-items: center; justify-content: center; }
.pf-statlab { font-size: 11px; color: #8B97A2; font-weight: 600; text-align: center; }
.pf-statval { font-size: 17px; font-weight: 750; font-variant-numeric: tabular-nums; }
.pf-statdiv { flex: 0 0 1px; width: 1px; background: #E4E9EE; margin: 2px 0; }

.pf-histlist { display: flex; flex-direction: column; margin-top: 8px; }
.pf-histrow { display: flex; align-items: center; gap: 10px; padding: 10px 6px; border-radius: 11px; cursor: pointer; transition: background .15s ease; }
.pf-histrow:hover { background: #F6F8FA; }
.pf-histrow:active { background: #EFF3F6; }
.pf-histmid { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.pf-histmonth { font-size: 14px; font-weight: 650; color: #1C2A33; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
.pf-histsub { font-size: 11.5px; color: #8B97A2; font-variant-numeric: tabular-nums; }
.pf-tag { font-size: 9.5px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #8B97A2; background: #EDF1F4; padding: 2px 6px; border-radius: 6px; }
.pf-histsaved { font-size: 15px; font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }

.pf-histdetail { display: flex; flex-direction: column; margin-bottom: 6px; }
.pf-hdrow { display: flex; align-items: center; justify-content: space-between; padding: 13px 4px; border-bottom: 1px solid #F0F3F5; font-size: 14px; color: #5A6873; }
.pf-hdrow strong { font-size: 16px; font-variant-numeric: tabular-nums; color: #1C2A33; }
.pf-hdrow--tot { border-bottom: none; }

.pf-backdrop { position: fixed; inset: 0; background: rgba(15,30,38,.42); backdrop-filter: blur(3px);
  display: flex; align-items: flex-end; justify-content: center; z-index: 50; animation: pf-fade .25s ease; }
.pf-sheet { width: 100%; max-width: 460px; background: #fff; border-radius: 26px 26px 0 0; padding: 10px 18px calc(20px + env(safe-area-inset-bottom));
  max-height: 90vh; overflow-y: auto; animation: pf-up .34s cubic-bezier(.22,1,.36,1); box-shadow: 0 -10px 40px rgba(15,30,38,.2); }
.pf-grab { width: 38px; height: 4px; border-radius: 999px; background: #DDE3E8; margin: 4px auto 10px; }
.pf-sheethead { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.pf-sheettitle { margin: 0; font-size: 18px; font-weight: 750; color: #16323D; }
.pf-x { width: 34px; height: 34px; border: none; border-radius: 10px; background: #F1F4F6; color: #5A6873; display: grid; place-items: center; cursor: pointer; transition: transform .15s; }
.pf-x:active { transform: scale(.9); }
.pf-help { font-size: 13px; color: #7A8794; margin: 0 0 14px; line-height: 1.5; }

.pf-field { margin-bottom: 14px; }
.pf-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pf-lab { display: block; font-size: 12.5px; font-weight: 650; color: #5A6873; margin-bottom: 7px; }
.pf-input { width: 100%; padding: 13px 14px; border: 1.5px solid #E2E8ED; border-radius: 13px; font-size: 16px; color: #1C2A33;
  background: #FAFBFC; font-family: inherit; transition: border-color .15s ease, background .15s ease; }
.pf-input:focus { outline: none; border-color: #3F9D8A; background: #fff; }
.pf-amtinput { position: relative; display: flex; align-items: center; }
.pf-cursign { position: absolute; left: 14px; font-size: 16px; font-weight: 600; color: #8B97A2; pointer-events: none; }
.pf-input--amt { padding-left: 30px; font-variant-numeric: tabular-nums; font-weight: 600; }
.pf-hint { display: block; font-size: 11.5px; color: #9AA5AE; margin-top: 6px; line-height: 1.4; }

.pf-catgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.pf-catchip { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 4px; border: 1.5px solid #EAEEF1; border-radius: 14px;
  background: #fff; cursor: pointer; transition: border-color .15s ease, background .15s ease, transform .12s ease; font-family: inherit; }
.pf-catchip:active { transform: scale(.95); }
.pf-catic { width: 34px; height: 34px; border-radius: 11px; display: grid; place-items: center; font-size: 18px; }
.pf-catlab { font-size: 10.5px; line-height: 1.2; text-align: center; color: #5A6873; font-weight: 550; }

.pf-actions { display: flex; gap: 10px; margin-top: 18px; }
.pf-btn { flex: 1; padding: 14px; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer;

.pf-btn--sec { background: #EAF4F1; color: #2F8E7B; }
.pf-btn--danger { background: #FBEDEA; color: #C25840; flex: 0 0 auto; padding: 14px 18px; }
.pf-btn--ghost { background: #F1F4F6; color: #5A6873; }

.pf-resetzone { margin-top: 18px; padding-top: 16px; border-top: 1px solid #EEF1F4; }

.pf-syncbox { border: 1px solid #E6EBEF; border-radius: 16px; padding: 14px; margin-bottom: 6px; }
.pf-syncstat { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 650; color: #5A6873; margin-bottom: 12px; }
.pf-dotled { width: 8px; height: 8px; border-radius: 50%; background: #C2CBD2; flex: 0 0 auto; }
.pf-dotled--ok { background: #3F9D8A; }
.pf-dotled--warn { background: #D8A24E; }
.pf-row2 { display: flex; gap: 8px; margin-bottom: 14px; }
.pf-row2 .pf-btn { flex: 1; padding: 12px; }
.pf-linkbtn { background: none; border: none; color: #2F8E7B; font-weight: 650; font-size: 12.5px; padding: 6px 0; cursor: pointer; font-family: inherit; }
.pf-divlabel { font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: #9AA5AE; margin: 20px 2px 10px; }
.pf-mini { font-size: 11.5px; color: #9AA5AE; line-height: 1.5; margin: 10px 2px 0; }
.pf-steps { margin: 0; padding-left: 18px; font-size: 13px; color: #5A6873; line-height: 1.65; }
.pf-steps li { margin-bottom: 8px; }
.pf-steps code { background: #F1F4F6; padding: 1px 6px; border-radius: 6px; font-size: 12px; word-break: break-all; }
.pf-callout { font-size: 12.5px; color: #8A6D3B; background: #FBF4E6; border: 1px solid #F0E2C4; border-radius: 12px; padding: 11px 13px; line-height: 1.5; margin: 12px 0 0; }

.pf-toast { position: fixed; left: 50%; bottom: calc(22px + env(safe-area-inset-bottom)); transform: translateX(-50%) translateY(20px);
  background: #16323D; color: #fff; font-size: 13.5px; font-weight: 600; padding: 12px 18px; border-radius: 14px; box-shadow: 0 12px 30px rgba(15,30,38,.3);
  opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 100; max-width: 88%; text-align: center; }
.pf-toast--on { opacity: 1; transform: translateX(-50%) translateY(0); }

button:focus-visible, input:focus-visible, [role="button"]:focus-visible { outline: 2px solid #3F9D8A; outline-offset: 2px; }
svg { display: block; }

@keyframes pf-fadeup { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
@keyframes pf-fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes pf-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes pf-pop { 0% { transform: scale(.5); } 55% { transform: scale(1.18); } 100% { transform: scale(1); } }

@media (prefers-reduced-motion: reduce) {
  .pf-hero, .pf-card { animation: none !important; }
  .pf-ringfill, .pf-seg, .pf-cyclefill, .pf-cycledot, .pf-btn, .pf-check, .pf-gear, .pf-x, .pf-add, .pf-goalfill, .pf-cbar { transition: none !important; }
  .pf-backdrop, .pf-sheet { animation-duration: .01ms !important; }
}
</style>
</head>

<div class="pf-root"><div class="pf-app" id="app"><div class="pf-splash"><div class="pf-spinner"></div></div></div></div>
<div id="sheet"></div>
<div class="pf-toast" id="pf-toast"></div>
<script src="app.js"></script>
</body>
</html>
